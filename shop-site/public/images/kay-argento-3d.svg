<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 230" width="320" height="230">
    <defs>
        <radialGradient id="s3f" cx="40%" cy="32%" r="66%">
            <stop offset="0%"   stop-color="#d8d8d8"/>
            <stop offset="35%"  stop-color="#b0b0b0"/>
            <stop offset="70%"  stop-color="#848484"/>
            <stop offset="100%" stop-color="#585858"/>
        </radialGradient>
        <linearGradient id="s3r" x1="15%" y1="10%" x2="85%" y2="90%">
            <stop offset="0%"   stop-color="#e6e6e6"/>
            <stop offset="50%"  stop-color="#909090"/>
            <stop offset="100%" stop-color="#383838"/>
        </linearGradient>
        <linearGradient id="s3side" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#606060"/>
            <stop offset="100%" stop-color="#282828"/>
        </linearGradient>
        <linearGradient id="s3t" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#f0f0f0"/>
            <stop offset="100%" stop-color="#9a9a9a"/>
        </linearGradient>
        <filter id="s3nd" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.72 0.72" numOctaves="4" seed="7" result="n"/>
            <feColorMatrix type="saturate" values="0" in="n" result="g"/>
            <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
            <feComposite in="b" in2="SourceGraphic" operator="in"/>
        </filter>
        <filter id="s3shd" x="-10%" y="-5%" width="125%" height="140%">
            <feDropShadow dx="4" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
        </filter>
    </defs>

    <!-- The coin is tilted: face squished to 60% height, shifted up -->
    <g transform="translate(160,110) scale(1,0.62) translate(-160,-110)">
        <!-- shadow under coin -->
        <ellipse cx="163" cy="175" rx="148" ry="40" fill="rgba(0,0,0,0.35)" filter="url(#s3shd)"/>

        <!-- SIDE THICKNESS (visible below face) -->
        <!-- Left arc of side -->
        <path d="M 8,110 Q 8,128 160,134 Q 312,128 312,110 L 312,122 Q 312,142 160,148 Q 8,142 8,122 Z"
              fill="url(#s3side)" opacity="0.95"/>

        <!-- outer rim -->
        <ellipse cx="160" cy="110" rx="152" ry="94" fill="url(#s3r)"/>
        <!-- inner face -->
        <ellipse cx="160" cy="110" rx="140" ry="82" fill="url(#s3f)" filter="url(#s3nd)"/>
        <!-- inner ring -->
        <ellipse cx="160" cy="110" rx="132" ry="74" fill="none" stroke="#4a4a4a" stroke-width="1.2" opacity="0.65"/>
        <ellipse cx="160" cy="110" rx="133.5" ry="75.5" fill="none" stroke="#ccc" stroke-width="0.5" opacity="0.4"/>

        <!-- text shadow -->
        <text x="162" y="130" text-anchor="middle"
              font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
              font-size="48" font-style="italic" font-weight="900"
              fill="#2a2a2a" opacity="0.9" letter-spacing="-2">bloynkay</text>
        <!-- text raised -->
        <text x="159.5" y="127.5" text-anchor="middle"
              font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
              font-size="48" font-style="italic" font-weight="900"
              fill="url(#s3t)" letter-spacing="-2">bloynkay</text>
    </g>
</svg>
