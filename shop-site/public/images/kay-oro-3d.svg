<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 230" width="320" height="230">
    <defs>
        <radialGradient id="g3f" cx="38%" cy="30%" r="68%">
            <stop offset="0%"   stop-color="#f0d060"/>
            <stop offset="30%"  stop-color="#c4982a"/>
            <stop offset="65%"  stop-color="#8a6010"/>
            <stop offset="100%" stop-color="#5a3806"/>
        </radialGradient>
        <linearGradient id="g3r" x1="12%" y1="8%" x2="88%" y2="92%">
            <stop offset="0%"   stop-color="#f8e070"/>
            <stop offset="45%"  stop-color="#b07818"/>
            <stop offset="100%" stop-color="#452a04"/>
        </linearGradient>
        <linearGradient id="g3side" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#7a5010"/>
            <stop offset="100%" stop-color="#2a1404"/>
        </linearGradient>
        <linearGradient id="g3t" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#fff8c0"/>
            <stop offset="100%" stop-color="#c09020"/>
        </linearGradient>
        <filter id="g3nd" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.72 0.72" numOctaves="4" seed="13" result="n"/>
            <feColorMatrix type="saturate" values="0" in="n" result="g"/>
            <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
            <feComposite in="b" in2="SourceGraphic" operator="in"/>
        </filter>
        <filter id="g3shd" x="-10%" y="-5%" width="125%" height="140%">
            <feDropShadow dx="4" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
        </filter>
    </defs>

    <g transform="translate(160,110) scale(1,0.62) translate(-160,-110)">
        <!-- shadow -->
        <ellipse cx="163" cy="175" rx="148" ry="40" fill="rgba(0,0,0,0.35)" filter="url(#g3shd)"/>

        <!-- SIDE THICKNESS -->
        <path d="M 8,110 Q 8,128 160,134 Q 312,128 312,110 L 312,122 Q 312,142 160,148 Q 8,142 8,122 Z"
              fill="url(#g3side)" opacity="0.95"/>

        <!-- outer rim -->
        <ellipse cx="160" cy="110" rx="152" ry="94" fill="url(#g3r)"/>
        <!-- face -->
        <ellipse cx="160" cy="110" rx="140" ry="82" fill="url(#g3f)" filter="url(#g3nd)"/>
        <!-- inner ring -->
        <ellipse cx="160" cy="110" rx="132" ry="74" fill="none" stroke="#5a3a08" stroke-width="1.2" opacity="0.65"/>
        <ellipse cx="160" cy="110" rx="133.5" ry="75.5" fill="none" stroke="#f0c840" stroke-width="0.5" opacity="0.4"/>

        <!-- text shadow -->
        <text x="162" y="130" text-anchor="middle"
              font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
              font-size="48" font-style="italic" font-weight="900"
              fill="#3a2004" opacity="0.9" letter-spacing="-2">bloynkay</text>
        <!-- text raised -->
        <text x="159.5" y="127.5" text-anchor="middle"
              font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
              font-size="48" font-style="italic" font-weight="900"
              fill="url(#g3t)" letter-spacing="-2">bloynkay</text>
    </g>
</svg>
