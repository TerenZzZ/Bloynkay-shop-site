<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
    <defs>
        <radialGradient id="gf" cx="36%" cy="30%" r="68%">
            <stop offset="0%"   stop-color="#f0d060"/>
            <stop offset="28%"  stop-color="#c9a030"/>
            <stop offset="62%"  stop-color="#8a6010"/>
            <stop offset="100%" stop-color="#5a3a06"/>
        </radialGradient>
        <linearGradient id="gr" x1="12%" y1="8%" x2="88%" y2="92%">
            <stop offset="0%"   stop-color="#f8e070"/>
            <stop offset="40%"  stop-color="#b87820"/>
            <stop offset="100%" stop-color="#4a2e06"/>
        </linearGradient>
        <linearGradient id="gt" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#fff8d0"/>
            <stop offset="100%" stop-color="#c09020"/>
        </linearGradient>
        <filter id="gnd" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.72 0.72" numOctaves="4" seed="11" result="n"/>
            <feColorMatrix type="saturate" values="0" in="n" result="g"/>
            <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
            <feComposite in="b" in2="SourceGraphic" operator="in"/>
        </filter>
        <filter id="gshd" x="-8%" y="-8%" width="120%" height="135%">
            <feDropShadow dx="3" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.5"/>
        </filter>
    </defs>

    <!-- shadow -->
    <ellipse cx="163" cy="112" rx="150" ry="88" fill="rgba(0,0,0,0.28)" filter="url(#gshd)"/>
    <!-- outer rim -->
    <ellipse cx="160" cy="100" rx="154" ry="95" fill="url(#gr)"/>
    <!-- rim inner edge shadow -->
    <ellipse cx="160" cy="100" rx="143" ry="84" fill="#3a2004" opacity="0.25"/>
    <!-- face -->
    <ellipse cx="160" cy="100" rx="142" ry="83" fill="url(#gf)" filter="url(#gnd)"/>

    <!-- inner engraved ring -->
    <ellipse cx="160" cy="100" rx="134" ry="75" fill="none" stroke="#5a3a08" stroke-width="1.2" opacity="0.7"/>
    <ellipse cx="160" cy="100" rx="135.5" ry="76.5" fill="none" stroke="#f0c840" stroke-width="0.6" opacity="0.45"/>

    <!-- oval decorative frame -->
    <ellipse cx="160" cy="102" rx="112" ry="54" fill="none" stroke="#8a6010" stroke-width="0.8" opacity="0.5"/>

    <!-- text shadow (recessed) -->
    <text x="162" y="120" text-anchor="middle"
          font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
          font-size="50" font-style="italic" font-weight="900"
          fill="#3a2004" opacity="0.9" letter-spacing="-2">bloynkay</text>
    <!-- text raised -->
    <text x="159.5" y="117.5" text-anchor="middle"
          font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
          font-size="50" font-style="italic" font-weight="900"
          fill="url(#gt)" letter-spacing="-2">bloynkay</text>

    <!-- specular glint -->
    <ellipse cx="160" cy="100" rx="154" ry="95" fill="none"
             stroke="white" stroke-width="3" opacity="0.14"
             stroke-dasharray="170 400"/>
</svg>
