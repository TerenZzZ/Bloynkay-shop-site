<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
    <defs>
        <radialGradient id="sbf" cx="40%" cy="35%" r="65%">
            <stop offset="0%"   stop-color="#c8c8c8"/>
            <stop offset="40%"  stop-color="#9a9a9a"/>
            <stop offset="80%"  stop-color="#707070"/>
            <stop offset="100%" stop-color="#505050"/>
        </radialGradient>
        <linearGradient id="sbr" x1="15%" y1="10%" x2="85%" y2="90%">
            <stop offset="0%"   stop-color="#e0e0e0"/>
            <stop offset="50%"  stop-color="#888"/>
            <stop offset="100%" stop-color="#383838"/>
        </linearGradient>
        <filter id="sbnd" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.78 0.78" numOctaves="4" seed="9" result="n"/>
            <feColorMatrix type="saturate" values="0" in="n" result="g"/>
            <feBlend in="SourceGraphic" in2="g" mode="multiply" result="b"/>
            <feComposite in="b" in2="SourceGraphic" operator="in"/>
        </filter>
        <filter id="sbshd" x="-8%" y="-8%" width="120%" height="135%">
            <feDropShadow dx="3" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.5"/>
        </filter>
        <!-- circular text path -->
        <path id="circ" d="M 160,100 m -116,0 a 116,70 0 1,1 232,0 a 116,70 0 1,1 -232,0"/>
    </defs>

    <!-- shadow -->
    <ellipse cx="163" cy="112" rx="150" ry="88" fill="rgba(0,0,0,0.28)" filter="url(#sbshd)"/>
    <!-- outer rim -->
    <ellipse cx="160" cy="100" rx="154" ry="95" fill="url(#sbr)"/>
    <!-- face -->
    <ellipse cx="160" cy="100" rx="142" ry="83" fill="url(#sbf)" filter="url(#sbnd)"/>
    <!-- inner rings -->
    <ellipse cx="160" cy="100" rx="134" ry="75" fill="none" stroke="#4a4a4a" stroke-width="1.2" opacity="0.7"/>
    <ellipse cx="160" cy="100" rx="135.5" ry="76.5" fill="none" stroke="#ccc" stroke-width="0.6" opacity="0.4"/>

    <!-- circular text around rim -->
    <text font-family="Arial,sans-serif" font-size="9.5" font-weight="700"
          fill="#c8c8c8" letter-spacing="2.5" text-anchor="start">
        <textPath href="#circ" startOffset="4%">
            · TAKE PART OR STAY OUT · GENESIS · BLOYNKAY · EST 2026 ·
        </textPath>
    </text>

    <!-- center content -->
    <!-- stars -->
    <text x="160" y="70" text-anchor="middle" font-size="11" fill="#b0b0b0" letter-spacing="18">★  ★  ★</text>
    <!-- GENESIS -->
    <text x="160" y="88" text-anchor="middle"
          font-family="Arial,sans-serif" font-size="9" font-weight="700"
          fill="#c0c0c0" letter-spacing="4" text-transform="uppercase">GENESIS</text>
    <!-- separator -->
    <line x1="116" y1="93" x2="204" y2="93" stroke="#888" stroke-width="0.8" opacity="0.7"/>
    <!-- LIMITED EDITION -->
    <text x="160" y="108" text-anchor="middle"
          font-family="'Arial Black',Arial,sans-serif" font-size="15" font-weight="900"
          fill="#d8d8d8" letter-spacing="1.5">LIMITED EDITION</text>
    <!-- separator -->
    <line x1="116" y1="114" x2="204" y2="114" stroke="#888" stroke-width="0.8" opacity="0.7"/>
    <!-- EST 2026 -->
    <text x="160" y="130" text-anchor="middle"
          font-family="Arial,sans-serif" font-size="12" font-weight="700"
          fill="#b0b0b0" letter-spacing="3">EST 2026</text>
    <!-- bottom stars -->
    <text x="160" y="148" text-anchor="middle" font-size="11" fill="#b0b0b0" letter-spacing="18">★  ★  ★</text>
</svg>
